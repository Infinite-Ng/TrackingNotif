<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITU Notice Tracking System</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <style>
        :root {
            --itu-blue: #009CD5;
            --itu-blue-light: rgba(0, 153, 214, 0.1);
            --itu-blue-hover: #0081b5;
            --border-color: #ced4da;
            --placeholder-gray: #999;
            --header-bg: #f8f9fa;
        }

        body {
            background-color: white;
            font-family: 'Segoe UI', sans-serif;
            padding: 0;
            margin: 0;
            font-size: 0.9rem;
        }

        /* --- Header Area --- */
        .header-area {
            width: 100%;
            background-color: #f8f9fa;
            border-bottom: 4px solid var(--itu-blue);
            padding: 15px 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header-title {
            font-size: 1.6rem;
            color: #2c3e50;
            font-weight: 500;
        }
        .header-logo {
            height: 55px;
            object-fit: contain;
        }

        .container-fluid-custom {
            padding: 0 30px;
        }

        /* === 1. Column Selector === */
        .column-selector-area {
            margin-bottom: 25px;
        }
        .col-btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .col-checkbox-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .col-chip {
            display: inline-flex;
            align-items: center;
            padding: 5px 10px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #495057;
            transition: all 0.2s;
        }
        .col-chip input {
            display: none;
        }
        .col-chip i {
            margin-right: 8px;
            font-size: 1rem;
            color: #ced4da;
        }
        .col-chip.active {
            background-color: #f8f9fa;
            border-color: #dee2e6;
        }
        .col-chip.active i {
            color: var(--itu-blue);
        }

        /* === 2. Filter Row === */
        .filter-row {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            margin-bottom: 20px;
        }
        .left-filters {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }
        .filter-group-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }

        .form-select-custom, .form-control-custom, .date-range-container {
            height: 38px !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 4px !important;
            font-size: 0.9rem;
            background-color: white;
            color: var(--placeholder-gray);
        }

        .form-select-custom {
            flex: 1 1 120px;
            text-align: center;
        }
        .form-control-custom {
            flex: 1 1 120px;
            text-align: center;
            color: #212529;
            padding: 0 10px;
        }
        .form-control-custom::placeholder {
            text-align: center;
        }

        .date-range-container {
            flex: 2 1 320px;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        .date-label-static {
            padding: 0 10px;
            color: var(--placeholder-gray);
            border-right: 1px solid var(--border-color);
            white-space: nowrap;
        }
        .date-input-wrapper {
            flex: 1;
            height: 100%;
        }
        .date-input-wrapper input[type="date"] {
            border: none;
            outline: none;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: var(--placeholder-gray) !important;
            background: transparent;
        }

        .form-select-custom.has-value,
        .date-input-wrapper input[type="date"].has-value,
        .form-control-custom {
            color: #212529 !important;
        }

        .form-select-custom option {
            color: #212529;
            background-color: white;
        }

        /* === 3. Right Actions === */
        .right-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 350px;
            margin-top: 0;
        }
        .search-container {
            position: relative;
            height: 38px;
            width: 100%;
            display: flex;
        }

        /* ITU Blue Buttons */
        .btn-custom-blue {
            background-color: var(--itu-blue) !important;
            color: white !important;
            border: none !important;
            height: 38px;
            border-radius: 4px;
            font-size: 0.85rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-custom-blue:hover {
            background-color: var(--itu-blue-hover) !important;
        }

        .search-btn {
            position: absolute;
            right: 0;
            top: 0;
            height: 38px;
            width: 38px;
            background: var(--itu-blue) !important;
            color: white !important;
            border: 1px solid var(--itu-blue) !important;
            border-radius: 0 4px 4px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-btn:hover {
            background-color: var(--itu-blue-hover) !important;
        }

        #searchInput {
            width: 100%;
            padding-left: 10px;
            color: #212529;
        }

        /* Pagination ITU Blue */
        .page-item.active .page-link {
            background-color: var(--itu-blue) !important;
            border-color: var(--itu-blue) !important;
            color: white !important;
        }
        .page-link {
            color: var(--itu-blue) !important;
        }

        /* Table Styles */
        table.dataTable {
            width: 100% !important;
            margin: 0 auto;
            font-size: 0.75rem;
            border-collapse: collapse !important;
            table-layout: auto;
        }

        table.dataTable thead th {
            background-color: var(--header-bg);
            color: #495057;
            font-weight: 600;
            padding: 4px 4px !important;
            border-bottom: 1px solid #dee2e6 !important;
            vertical-align: middle;
            white-space: nowrap;
            text-align: center !important;
            font-size: 0.7rem;
        }

        table.dataTable tbody td {
            padding: 4px 5px !important;
            vertical-align: middle;
            white-space: nowrap;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            border-bottom: 1px solid #dee2e6;
            text-align: center !important;
        }

        table.dataTable tbody td:hover {
            white-space: normal;
            position: relative;
            z-index: 10;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .dataTables_scrollHead {
            margin-bottom: 0 !important;
        }

        .dataTables_scrollBody {
            border-top: none !important;
            border-bottom: 1px solid #dee2e6;
        }

        /* Table responsive wrapper */
        .table-responsive {
            max-height: 65vh;
            overflow: auto;
        }
        
        /* Sticky header */
        #ituTable thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: var(--header-bg);
        }
        
        #ituTable thead .header-row th {
            background-color: var(--header-bg);
            border-bottom: 2px solid var(--itu-blue);
        }
        
        #ituTable thead .column-filter-row th {
            background-color: #fff;
        }

        .pagination {
            --bs-pagination-padding-x: 0.5rem;
            --bs-pagination-padding-y: 0.25rem;
            --bs-pagination-font-size: 0.75rem;
            margin-top: 10px;
        }

        #lastUpdated {
            font-size: 0.85rem;
            color: #6c757d;
        }

        /* === Column Filter Inputs === */
        .column-filter-row th {
            padding: 2px 2px !important;
            background-color: #f8f9fa;
        }

        .column-filter {
            width: 100%;
            height: 24px;
            padding: 2px 4px;
            border: 1px solid #dee2e6;
            border-radius: 3px;
            font-size: 0.7rem;
            box-sizing: border-box;
        }

        .column-filter:focus {
            border-color: var(--itu-blue);
            outline: none;
        }

        .column-filter-date {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .column-filter-date input {
            width: 85px;
            height: 20px;
            padding: 1px 2px;
            border: 1px solid #dee2e6;
            border-radius: 3px;
            font-size: 0.6rem;
        }

        .column-filter-date input:focus {
            border-color: var(--itu-blue);
            outline: none;
        }
    </style>
</head>
<body>

    <div class="header-area">
        <img src="./logo-itu-slogan.svg" class="header-logo" alt="ITU Logo">
        <div class="header-title">Space Services Department - Notice Tracking</div>
    </div>

    <div class="container-fluid-custom">
        <!-- Column Selector Area -->
        <div class="column-selector-area">
            <div class="col-btn-group">
                <button class="btn btn-sm btn-outline-secondary" id="selectAllColumns">All</button>
                <button class="btn btn-sm btn-outline-secondary" id="deselectAllColumns">None</button>
                <button class="btn btn-sm btn-custom-blue" id="applyColumnSettings" style="height:31px; flex:none; width:80px; padding:0;">Apply</button>
                <button class="btn btn-sm btn-outline-danger" id="resetColumnSettings" style="height:31px; flex:none; padding:0 10px; margin-left:10px;" title="Clear saved column settings">Reset</button>
            </div>
            <div id="columnChipsContainer" class="col-checkbox-container"></div>
        </div>

        <!-- Filter Row -->
        <div class="filter-row">
            <div class="left-filters">
                <div class="w-100 d-flex justify-content-between align-items-center">
                    <h5 class="m-0" style="color:#495057; font-weight:600;">Data Preview</h5>
                    <span id="lastUpdated"></span>
                </div>

                <div class="filter-group-row">
                    <select id="filter_ADM" class="form-select-custom" onchange="handleSelectColor(this)">
                        <option value="">ADM</option>
                    </select>
                    <select id="filter_PHASE" class="form-select-custom" onchange="handleSelectColor(this)">
                        <option value="">PHASE</option>
                        <option value="R">R</option>
                        <option value="F">F</option>
                    </select>
                    <select id="filter_act_code" class="form-select-custom" onchange="handleSelectColor(this)">
                        <option value="">act_code</option>
                        <option value="A">A</option>
                        <option value="M">M</option>
                    </select>
                    <select id="filter_subtoc" class="form-select-custom" onchange="handleSelectColor(this)">
                        <option value="">subtoc</option>
                        <option value="True">True</option>
                        <option value="False">False</option>
                    </select>
                    <select id="filter_f_11_32A" class="form-select-custom" onchange="handleSelectColor(this)">
                        <option value="">11.32A</option>
                        <option value="True">True</option>
                        <option value="False">False</option>
                    </select>
                    <select id="filter_f_11_41" class="form-select-custom" onchange="handleSelectColor(this)">
                        <option value="">11.41</option>
                        <option value="True">True</option>
                        <option value="False">False</option>
                    </select>
                    <input type="text" id="filter_SatName" class="form-control-custom" placeholder="Satellite Name">
                </div>

                <div class="filter-group-row">
                    <div class="date-range-container">
                        <div class="date-label-static">DateOfReceive</div>
                        <div class="date-input-wrapper"><input type="date" id="filter_date_start" onchange="handleDateColor(this)"></div>
                        <div style="width:1px; background:#ced4da; height:60%;"></div>
                        <div class="date-input-wrapper"><input type="date" id="filter_date_end" onchange="handleDateColor(this)"></div>
                    </div>
                    <div class="date-range-container">
                        <div class="date-label-static">BRReg</div>
                        <div class="date-input-wrapper"><input type="date" id="filter_brreg_start" onchange="handleDateColor(this)"></div>
                        <div style="width:1px; background:#ced4da; height:60%;"></div>
                        <div class="date-input-wrapper"><input type="date" id="filter_brreg_end" onchange="handleDateColor(this)"></div>
                    </div>
                </div>
            </div>

            <div class="right-actions">
                <div class="d-flex gap-2 w-100">
                    <button class="btn btn-custom-blue btn-sm" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
                    <button class="btn btn-custom-blue btn-sm" id="resetBtn"><i class="fas fa-undo"></i> Reset</button>
                    <button class="btn btn-custom-blue btn-sm" id="downloadBtn"><i class="fas fa-file-excel"></i> Export</button>
                </div>
                <div class="search-container">
                    <input type="text" id="searchInput" class="form-control-custom" placeholder="Search">
                    <button class="search-btn"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white border-top pt-2">
            <div class="table-responsive">
                <table id="ituTable" class="table table-hover w-100">
                    <thead>
                        <tr class="header-row">
                            <th>SNTrack ID</th>
                            <th>ADM</th>
                            <th>ntwk_org</th>
                            <th>SatName</th>
                            <th>long_nom</th>
                            <th>BRReg</th>
                            <th>DateOfReceive</th>
                            <th>Notice ID</th>
                            <th>act_code</th>
                            <th>tgt_ntc_id</th>
                            <th>TypeOfSubmission</th>
                            <th>PHASE</th>
                            <th>11.32A</th>
                            <th>11.41</th>
                            <th>subtoc</th>
                            <th>d_check_in</th>
                            <th>d_spr_out</th>
                            <th>CIRC</th>
                            <th>pub</th>
                            <th>CIRC2</th>
                            <th>pub2</th>
                            <th>CIRC3</th>
                            <th>pub3</th>
                            <th>SUP</th>
                            <th>remarks</th>
                            <th>InternalReference</th>
                        </tr>
                        <tr class="column-filter-row">
                            <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
                            <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
                            <th></th><th></th><th></th><th></th><th></th><th></th><th></th>
                            <th></th><th></th><th></th><th></th><th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        // Column configuration
        const columnConfig = [
            { data: 'sntrack_id', title: 'SNTrack ID' },
            { data: 'ADM', title: 'ADM' },
            { data: 'ntwk_org', title: 'ntwk_org' },
            { data: 'SatName', title: 'SatName' },
            { data: 'long_nom', title: 'long_nom', render: function(data) {
                if (data === null || data === undefined || data === '') return '';
                var num = parseFloat(data);
                if (isNaN(num)) return data;
                return (Math.round(num * 10) / 10).toString();
            }},
            { data: 'BRREG', title: 'BRReg', render: function(data) { return data ? data.substring(0, 10) : ''; }},
            { data: 'DateOfReceive', title: 'DateOfReceive', render: function(data) { return data ? data.substring(0, 10) : ''; }},
            { data: 'ntc_id', title: 'Notice ID' },
            { data: 'act_code', title: 'act_code' },
            { data: 'tgt_ntc_id', title: 'tgt_ntc_id' },
            { data: 'TypeOfSubmission', title: 'TypeOfSubmission' },
            { data: 'PHASE', title: 'PHASE' },
            { data: 'f_11_32A', title: '11.32A' },
            { data: 'f_11_41', title: '11.41' },
            { data: 'subtoc', title: 'subtoc' },
            { data: 'd_check_in', title: 'd_check_in', render: function(data) { return data ? data.substring(0, 10) : ''; }},
            { data: 'd_spr_out', title: 'd_spr_out', render: function(data) { return data ? data.substring(0, 10) : ''; }},
            { data: 'CIRC', title: 'CIRC' },
            { data: 'PUB', title: 'pub', render: function(data) { return data ? data.substring(0, 10) : ''; }},
            { data: 'CIRC2', title: 'CIRC2' },
            { data: 'PUB2', title: 'pub2', render: function(data) { return data ? data.substring(0, 10) : ''; }},
            { data: 'CIRC3', title: 'CIRC3' },
            { data: 'PUB3', title: 'pub3', render: function(data) { return data ? data.substring(0, 10) : ''; }},
            { data: 'SUP', title: 'SUP' },
            { data: 'remarks', title: 'remarks' },
            { data: 'InternalReference', title: 'InternalReference' }
        ];

        // Track column visibility
        let columnVisibility = columnConfig.map(() => true);

        // Handle select color change
        function handleSelectColor(el) {
            if (el.value && el.value !== '' && el.selectedIndex > 0) {
                el.classList.add('has-value');
            } else {
                el.classList.remove('has-value');
            }
        }

        // Handle date color change
        function handleDateColor(el) {
            if (el.value) {
                el.classList.add('has-value');
            } else {
                el.classList.remove('has-value');
            }
        }

        $(document).ready(function() {
            var table;
            var allData = [];

            // Initialize column visibility - check localStorage first
            (function initColumnVisibility() {
                try {
                    var saved = localStorage.getItem('ituTableColumnSettings');
                    if (saved) {
                        var parsed = JSON.parse(saved);
                        // Validate: must be array with same length and at least one visible
                        if (Array.isArray(parsed) && 
                            parsed.length === columnConfig.length && 
                            parsed.filter(v => v).length > 0) {
                            columnVisibility = parsed;
                        } else {
                            localStorage.removeItem('ituTableColumnSettings');
                        }
                    }
                } catch(e) {
                    localStorage.removeItem('ituTableColumnSettings');
                }
            })();

            // Build column chips
            function buildColumnChips() {
                var $container = $('#columnChipsContainer');
                $container.empty();

                columnConfig.forEach(function(col, idx) {
                    var isActive = columnVisibility[idx];
                    var $chip = $('<label class="col-chip' + (isActive ? ' active' : '') + '" data-index="' + idx + '">' +
                        '<input type="checkbox" ' + (isActive ? 'checked' : '') + '>' +
                        '<i class="fas fa-check-circle"></i>' +
                        '<span>' + col.title + '</span>' +
                        '</label>');
                    
                    $chip.on('click', function(e) {
                        e.preventDefault();
                        var $this = $(this);
                        var $cb = $this.find('input');
                        var checked = !$cb.prop('checked');
                        $cb.prop('checked', checked);
                        $this.toggleClass('active', checked);
                        columnVisibility[idx] = checked;
                    });

                    $container.append($chip);
                });
            }

            // Select all columns
            $('#selectAllColumns').on('click', function() {
                columnVisibility = columnConfig.map(() => true);
                buildColumnChips();
            });

            // Deselect all columns
            $('#deselectAllColumns').on('click', function() {
                columnVisibility = columnConfig.map(() => false);
                buildColumnChips();
            });

            // Reset column settings (clear localStorage and show all columns)
            $('#resetColumnSettings').on('click', function() {
                localStorage.removeItem('ituTableColumnSettings');
                columnVisibility = columnConfig.map(() => true);
                buildColumnChips();
                if (table) {
                    columnConfig.forEach(function(col, idx) {
                        table.column(idx).visible(true);
                    });
                    table.columns.adjust().draw();
                    buildColumnFilters(table);
                }
            });

            // Apply column settings
            $('#applyColumnSettings').on('click', function() {
                // Check if at least one column is visible
                var visibleCount = columnVisibility.filter(v => v).length;
                if (visibleCount === 0) {
                    alert('At least one column must be visible!');
                    return;
                }
                
                columnConfig.forEach(function(col, idx) {
                    table.column(idx).visible(columnVisibility[idx]);
                });
                table.columns.adjust().draw();

                // Rebuild column filters for visible columns
                buildColumnFilters(table);

                // Save to localStorage
                try {
                    localStorage.setItem('ituTableColumnSettings', JSON.stringify(columnVisibility));
                } catch(e) {
                    console.warn('Cannot save column settings:', e);
                }
            });

            // Restore column settings from localStorage
            function restoreColumnSettings() {
                try {
                    var saved = localStorage.getItem('ituTableColumnSettings');
                    if (saved) {
                        var parsedSettings = JSON.parse(saved);
                        // Validate that at least some columns are visible
                        var visibleCount = parsedSettings.filter(v => v).length;
                        if (visibleCount > 0 && parsedSettings.length === columnConfig.length) {
                            columnVisibility = parsedSettings;
                        } else {
                            // Invalid settings, reset to all visible
                            columnVisibility = columnConfig.map(() => true);
                            localStorage.removeItem('ituTableColumnSettings');
                        }
                    }
                    // Apply visibility to table
                    if (table) {
                        columnConfig.forEach(function(col, idx) {
                            table.column(idx).visible(columnVisibility[idx]);
                        });
                        // Rebuild chips to reflect current state
                        buildColumnChips();
                    }
                } catch(e) {
                    console.warn('Cannot restore column settings:', e);
                    // Reset on error
                    columnVisibility = columnConfig.map(() => true);
                }
            }

            // Date column indices for range filtering
            const dateColumnIndices = {
                'BRREG': 5,
                'DateOfReceive': 6,
                'd_check_in': 15,
                'd_spr_out': 16,
                'PUB': 18,
                'PUB2': 20,
                'PUB3': 22
            };

            // Custom filtering function (registered only once globally)
            if (!window._ituSearchFnRegistered) {
                window._ituSearchFnRegistered = true;
                $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
                // Top filter bar - DateOfReceive
                var dateStart = $('#filter_date_start').val();
                var dateEnd = $('#filter_date_end').val();
                var dateVal = data[6] ? data[6].substring(0, 10) : '';
                if (dateStart && dateVal < dateStart) return false;
                if (dateEnd && dateVal > dateEnd) return false;

                // Top filter bar - BRReg
                var brregStart = $('#filter_brreg_start').val();
                var brregEnd = $('#filter_brreg_end').val();
                var brregVal = data[5] ? data[5].substring(0, 10) : '';
                if (brregStart && brregVal < brregStart) return false;
                if (brregEnd && brregVal > brregEnd) return false;

                // Column date filters
                for (var key in dateColumnIndices) {
                    var colIdx = dateColumnIndices[key];
                    var minVal = $('#col-min-date-' + key).val();
                    var maxVal = $('#col-max-date-' + key).val();
                    var cellVal = data[colIdx] ? data[colIdx].substring(0, 10) : '';
                    if (minVal && cellVal < minVal) return false;
                    if (maxVal && cellVal > maxVal) return false;
                }

                return true;
            });
            } // end if (!window._ituSearchFnRegistered)

            // Initialize DataTable
            var tableInitialized = false;
            
            function initTable(data) {
                // Prevent double initialization
                if (tableInitialized) {
                    console.warn('Table already initialized, skipping');
                    return;
                }
                
                // Destroy existing table if any
                if ($.fn.DataTable.isDataTable('#ituTable')) {
                    $('#ituTable').DataTable().destroy();
                }
                
                tableInitialized = true;
                
                table = $('#ituTable').DataTable({
                    data: data,
                    columns: columnConfig,
                    orderCellsTop: true,
                    pageLength: 20,
                    order: [[6, "desc"]],
                    dom: '<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6"i>>' +
                         '<"row"<"col-sm-12"tr>>' +
                         '<"row"<"col-sm-12 col-md-5"><"col-sm-12 col-md-7"p>>',
                    initComplete: function() {
                        var api = this.api();
                        
                        // Build column chips for visibility control
                        buildColumnChips();
                        
                        // Restore saved column visibility settings
                        restoreColumnSettings();
                        
                        // Build column filters in header row
                        buildColumnFilters(api);
                        
                        // Show table and status
                        $('#ituTable').show();
                        $('#lastUpdated').text('Data loaded: ' + allData.length + ' records');
                    }
                });
            }

            // Load data via jQuery ajax (most reliable for server deployment)
            function loadData() {
                $.ajax({
                    url: './data/data.json',
                    dataType: 'json',
                    success: function(data) {
                        console.log('Data loaded:', data.length, 'records');
                        // Filter out records with empty SNTrack ID
                        var filteredData = data.filter(function(row) {
                            return row.sntrack_id && row.sntrack_id.toString().trim() !== '';
                        });
                        console.log('After filtering empty SNTrack:', filteredData.length, 'records');
                        allData = filteredData;
                        populateADMFilter(filteredData);
                        initTable(filteredData);
                    },
                    error: function(xhr, status, error) {
                        console.error('Failed to load data:', status, error);
                        $('#lastUpdated').html('<span style="color:red">Error loading data: ' + error + '</span>');
                        initTable([]);
                    }
                });
            }

            loadData();

            // Build column filters in header row
            function buildColumnFilters(api) {
                // Target the filter row in the original table
                var $filterRow = $('#ituTable thead .column-filter-row');
                
                // Get all th elements in the filter row
                var $filterCells = $filterRow.find('th');

                var dateColumns = ['BRREG', 'DateOfReceive', 'd_check_in', 'd_spr_out', 'PUB', 'PUB2', 'PUB3'];
                var selectColumns = {
                    'act_code': ['', 'A', 'M'],
                    'PHASE': ['', 'R', 'F'],
                    'subtoc': ['', 'True', 'False'],
                    'f_11_32A': ['', 'True', 'False'],
                    'f_11_41': ['', 'True', 'False'],
                    'CIRC': ['', 'HasValue', 'Empty'],
                    'CIRC2': ['', 'HasValue', 'Empty'],
                    'CIRC3': ['', 'HasValue', 'Empty']
                };

                api.columns().every(function(colIdx) {
                    var column = this;
                    var dataSrc = columnConfig[colIdx].data;
                    var $th = $($filterCells[colIdx]);
                    $th.empty();  // Clear existing content

                    if (dateColumns.includes(dataSrc)) {
                        // Date range filter
                        var $dateFilter = $('<div class="column-filter-date">' +
                            '<input type="date" id="col-min-date-' + dataSrc + '" placeholder="From" title="Start Date">' +
                            '<input type="date" id="col-max-date-' + dataSrc + '" placeholder="To" title="End Date">' +
                            '</div>');
                        $th.append($dateFilter);
                        $dateFilter.find('input').on('change', function() {
                            api.draw();
                        });

                    } else if (selectColumns[dataSrc]) {
                        // Select dropdown filter
                        var options = selectColumns[dataSrc].map(function(opt) {
                            var label = opt === '' ? 'All' : (opt === 'HasValue' ? '✓' : (opt === 'Empty' ? '∅' : opt));
                            return '<option value="' + opt + '">' + label + '</option>';
                        }).join('');
                        var $select = $('<select class="column-filter">' + options + '</select>');
                        $th.append($select);
                        $select.on('change', function() {
                            var val = $(this).val();
                            var searchVal = '';
                            if (val === 'Empty') {
                                searchVal = '^$';
                            } else if (val === 'HasValue') {
                                searchVal = '^.+$';
                            } else if (val) {
                                searchVal = '^' + $.fn.dataTable.util.escapeRegex(val) + '$';
                            }
                            column.search(searchVal, true, false).draw();
                        });

                    } else {
                        // Text input filter
                        var $input = $('<input type="text" class="column-filter" placeholder="Filter...">');
                        $th.append($input);
                        $input.on('keyup change', function() {
                            var val = $(this).val();
                            if (column.search() !== val) {
                                column.search(val, false, true).draw();
                            }
                        });
                    }
                });
            }

            // Populate ADM filter from data
            function populateADMFilter(data) {
                var admSet = new Set();
                data.forEach(function(row) {
                    if (row.ADM) admSet.add(row.ADM);
                });
                var $select = $('#filter_ADM');
                admSet.forEach(function(adm) {
                    $select.append('<option value="' + adm + '">' + adm + '</option>');
                });
            }

            // Search input
            $('#searchInput').on('keyup', function() {
                table.search(this.value).draw();
            });

            $('.search-btn').on('click', function() {
                table.search($('#searchInput').val()).draw();
            });

            // Filter handlers
            $('#filter_ADM').on('change', function() {
                var val = $(this).val();
                table.column(1).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
            });

            $('#filter_PHASE').on('change', function() {
                var val = $(this).val();
                table.column(11).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
            });

            $('#filter_act_code').on('change', function() {
                var val = $(this).val();
                table.column(8).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
            });

            $('#filter_subtoc').on('change', function() {
                var val = $(this).val();
                table.column(14).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
            });

            $('#filter_f_11_32A').on('change', function() {
                var val = $(this).val();
                table.column(12).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
            });

            $('#filter_f_11_41').on('change', function() {
                var val = $(this).val();
                table.column(13).search(val ? '^' + $.fn.dataTable.util.escapeRegex(val) + '$' : '', true, false).draw();
            });

            $('#filter_SatName').on('keyup change', function() {
                var val = $(this).val();
                table.column(3).search(val, false, true).draw();
            });

            // Date filters trigger redraw
            $('#filter_date_start, #filter_date_end, #filter_brreg_start, #filter_brreg_end').on('change', function() {
                table.draw();
            });

            // Refresh button
            $('#refreshBtn').on('click', function() {
                var btn = $(this);
                btn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Loading...');
                
                $.ajax({
                    url: './data/data.json',
                    dataType: 'json',
                    cache: false, // Prevent caching
                    success: function(data) {
                        // Filter out records with empty SNTrack ID
                        var filteredData = data.filter(function(row) {
                            return row.sntrack_id && row.sntrack_id.toString().trim() !== '';
                        });
                        allData = filteredData;
                        table.clear().rows.add(filteredData).draw();
                        var now = new Date();
                        $('#lastUpdated').text('Synced: ' + now.toLocaleTimeString() + ' (' + filteredData.length + ' records)');
                        btn.prop('disabled', false).html('<i class="fas fa-sync-alt"></i> Refresh');
                    },
                    error: function(xhr, status, error) {
                        console.error('Refresh failed:', error);
                        btn.prop('disabled', false).html('<i class="fas fa-sync-alt"></i> Refresh');
                        alert('Failed to refresh data: ' + error);
                    }
                });
            });

            // Reset button
            $('#resetBtn').on('click', function() {
                // Reset top filter bar
                $('.form-select-custom').val('').removeClass('has-value');
                $('.form-control-custom').val('');
                $('input[type="date"]').val('').removeClass('has-value');
                $('#searchInput').val('');

                // Reset column filters
                $('.column-filter').val('');
                $('.column-filter-date input').val('');

                // Clear DataTable searches
                table.columns().search('');
                table.search('');
                table.draw();
            });

            // Download/Export button
            $('#downloadBtn').on('click', function() {
                const filteredData = table.rows({ search: 'applied' }).data().toArray();

                const columns = [
                    { key: 'sntrack_id', header: 'SNTrack ID' },
                    { key: 'ADM', header: 'ADM' },
                    { key: 'ntwk_org', header: 'ntwk_org' },
                    { key: 'ntc_id', header: 'Notice ID' },
                    { key: 'SatName', header: 'SatName' },
                    { key: 'long_nom', header: 'long_nom' },
                    { key: 'BRREG', header: 'BRReg' },
                    { key: 'DateOfReceive', header: 'DateOfReceive' },
                    { key: 'tgt_ntc_id', header: 'tgt_ntc_id' },
                    { key: 'SUP', header: 'SUP' },
                    { key: 'act_code', header: 'act_code' },
                    { key: 'TypeOfSubmission', header: 'TypeOfSubmission' },
                    { key: 'PHASE', header: 'PHASE' },
                    { key: 'f_11_32A', header: 'Prov 11.32A' },
                    { key: 'f_11_41', header: 'Prov 11.41' },
                    { key: 'subtoc', header: 'subtoc' },
                    { key: 'd_check_in', header: 'd_check_in' },
                    { key: 'd_spr_out', header: 'd_spr_out' },
                    { key: 'CIRC', header: 'CIRC' },
                    { key: 'PUB', header: 'pub' },
                    { key: 'CIRC2', header: 'CIRC2' },
                    { key: 'PUB2', header: 'pub2' },
                    { key: 'CIRC3', header: 'CIRC3' },
                    { key: 'PUB3', header: 'pub3' },
                    { key: 'InternalReference', header: 'InternalReference' },
                    { key: 'remarks', header: 'remarks' }
                ];

                const exportData = filteredData.map(row => {
                    const formattedRow = {};
                    columns.forEach(col => {
                        if (['BRREG', 'PUB', 'PUB2', 'PUB3', 'd_check_in', 'd_spr_out', 'DateOfReceive'].includes(col.key)) {
                            formattedRow[col.header] = row[col.key] ? row[col.key].substring(0, 10) : '';
                        } else {
                            formattedRow[col.header] = row[col.key] || '';
                        }
                    });
                    return formattedRow;
                });

                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Notice Data");

                const today = new Date();
                const fileName = `notice_report_${today.getFullYear()}${(today.getMonth()+1).toString().padStart(2, '0')}${today.getDate().toString().padStart(2, '0')}.xlsx`;

                XLSX.writeFile(wb, fileName);
            });
        });
    </script>
</body>
</html>
